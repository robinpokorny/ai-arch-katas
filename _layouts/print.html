<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 9pt;
      line-height: 1.3;
      color: #1a1a1a;
    }

    /* ── screen-only header ── */
    .print-header {
      text-align: center;
      padding: 1.5rem 1rem .5rem;
    }
    .print-header h1 { font-size: 1.4rem; margin-bottom: .3rem; }
    .print-header p  { font-size: .85rem; color: #555; margin-bottom: .6rem; }
    .print-header .back-link {
      display: inline-block;
      font-size: .8rem;
      color: #7253ed;
      text-decoration: none;
      margin-bottom: 1rem;
    }
    .print-header .back-link:hover { text-decoration: underline; }

    /* ── page sheet: fixed A4 grid of 2×2 cards ── */
    .card-page {
      width: 190mm;       /* A4 minus margins */
      height: 277mm;      /* A4 minus margins */
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: .7rem;
      padding: 0;
    }
    .card-page + .card-page { margin-top: .5rem; }

    /* ── individual card ── */
    .card {
      border: 1.5pt solid #222;
      border-left: 5pt solid var(--accent, #222);
      border-radius: 5px;
      padding: .6rem .7rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── card header row: icon + tag ── */
    .card-header {
      display: flex;
      align-items: center;
      gap: .3rem;
      margin-bottom: .25rem;
    }
    .card-icon {
      font-size: 14pt;
      line-height: 1;
    }
    .card-tag {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
    }

    /* persona markdown starts with h1 */
    .card h1 {
      font-size: 11pt;
      margin-bottom: .25rem;
      border-bottom: 1pt solid #ccc;
      padding-bottom: .15rem;
    }
    .card h2 {
      font-size: 10pt;
      margin-bottom: .15rem;
      border-bottom: 1pt solid #ccc;
      padding-bottom: .1rem;
    }
    .card blockquote {
      font-style: italic;
      color: #444;
      font-size: 8pt;
      margin: .2rem 0 .3rem;
      padding-left: .4rem;
      border-left: 2pt solid #bbb;
    }
    .card p {
      margin-bottom: .2rem;
      font-size: 8.5pt;
    }
    .card strong { font-weight: 600; }

    .card h3 {
      font-size: 8pt;
      margin-top: .3rem;
      margin-bottom: .1rem;
      text-transform: uppercase;
      letter-spacing: .03em;
      color: #555;
    }
    .card ul {
      padding-left: 1.1em;
      margin-bottom: .15rem;
      font-size: 8pt;
    }
    .card li { margin-bottom: .06rem; }

    .card-footer {
      margin-top: auto;
      padding-top: .3rem;
      border-top: .5pt solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .3rem;
    }
    .card-footer .short-url {
      font-size: 11pt;
      font-weight: 700;
      color: #222;
      text-decoration: none;
    }
    .card-footer img {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    /* ── print overrides ── */
    @media print {
      .print-header { display: none; }

      @page {
        size: A4 portrait;
        margin: 8mm;
      }
      body { font-size: 8.5pt; }
      .card-page {
        width: 100%;
        height: 100vh;
        margin: 0;
        gap: .6rem;
        page-break-after: always;
      }
      .card-page:last-of-type { page-break-after: auto; }
      .card {
        border-width: 1pt;
        border-left-width: 4pt;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
