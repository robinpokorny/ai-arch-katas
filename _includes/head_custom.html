<!-- SEO: canonical URL, JSON-LD structured data -->
{% seo %}

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:locale" content="en_GB">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">

{% if page.accent %}
<!-- Persona accent styling -->
<style>
  .main-content {
    border-top: 4px solid {{ page.accent }};
  }
  .main-content h1:first-of-type::before {
    content: "{{ page.icon }} ";
  }
</style>
{% endif %}
