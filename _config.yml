title: AI-Enabled Architectural Katas
description: >-
  A ready-to-run format for practising software architecture with constrained AI personas.
  Created by Software Design Berlin.

theme: just-the-docs

# Author & social
author:
  name: Robin Pokorny
social:
  name: Software Design Berlin
  links:
    - https://www.meetup.com/software-design-berlin/
    - https://github.com/robinpokorny/ai-arch-katas

url: "https://robinpokorny.github.io"
baseurl: "/ai-arch-katas"
permalink: pretty

# Plugins
plugins:
  - jekyll-redirect-from
  - jekyll-seo-tag

# Navigation
nav_sort: case_insensitive
heading_anchors: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# External links open in new tab
external_links:
  enabled: true
  warn_external: false
  new_tab: true

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Include README files (Jekyll skips them by default)
include:
  - README.md

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - docker-compose.yml
  - vendor/
